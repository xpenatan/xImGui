name: Build and Upload

on:
  workflow_call:
    inputs:
      isRelease:
        required: true
        type: boolean
      shouldUpload:
        required: true
        type: boolean

env:
  CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
  CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
  SIGNING_KEY: ${{ secrets.PGP_SECRET }}
  SIGNING_PASSWORD: ${{ secrets.PGP_PASSPHRASE }}

jobs:
  build_windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.13.1
        with:
          access_token: ${{ github.token }}

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: 25

      - name: Set up Developer Command Prompt
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64

      - name: Append the directory of 'vcvarsall.bat' to PATH environment variable
        uses: myci-actions/export-env-var-powershell@1
        with:
          name: PATH
          value: $env:PATH;C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build

      - name: Download sources
        run: ./gradlew download_all_sources

      - name: Build JNI project
        run: ./gradlew :imgui:imgui-build:build_project_windows64_jni

      - name: Build FFM project
        run: ./gradlew :imgui:imgui-build:build_project_windows64_ffm

      - name: Build JNI ImLayout library
        run: ./gradlew :extensions:imlayout:imlayout-build:build_project_windows64_jni

      - name: Build FFM ImLayout library
        run: ./gradlew :extensions:imlayout:imlayout-build:build_project_windows64_ffm

      - name: Build JNI ImGuiColorTextEdit library
        run: ./gradlew :extensions:ImGuiColorTextEdit:textedit-build:build_project_windows64_jni

      - name: Build FFM ImGuiColorTextEdit library
        run: ./gradlew :extensions:ImGuiColorTextEdit:textedit-build:build_project_windows64_ffm

      - name: Build JNI imgui-node-editor library
        run: ./gradlew :extensions:imgui-node-editor:nodeeditor-build:build_project_windows64_jni

      - name: Build FFM imgui-node-editor library
        run: ./gradlew :extensions:imgui-node-editor:nodeeditor-build:build_project_windows64_ffm

      - name: Upload ImGui natives
        uses: actions/upload-artifact@v7
        with:
          name: windows-natives-imgui
          path: ./imgui/imgui-build/build/c++/libs/
          if-no-files-found: error

      - name: Upload ImLayout natives
        uses: actions/upload-artifact@v7
        with:
          name: windows-natives-imlayout
          path: ./extensions/imlayout/imlayout-build/build/c++/libs/
          if-no-files-found: error

      - name: Upload ImGuiColorTextEdit natives
        uses: actions/upload-artifact@v7
        with:
          name: windows-natives-textedit
          path: ./extensions/ImGuiColorTextEdit/textedit-build/build/c++/libs/
          if-no-files-found: error

      - name: Upload imgui-node-editor natives
        uses: actions/upload-artifact@v7
        with:
          name: windows-natives-nodeeditor
          path: ./extensions/imgui-node-editor/nodeeditor-build/build/c++/libs/
          if-no-files-found: error

  build_linux:
    name: Build Linux
    runs-on: ubuntu-22.04

    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.13.1
        with:
          access_token: ${{ github.token }}

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: 25

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Download sources
        run: ./gradlew download_all_sources

      - name: Build JNI project
        run: ./gradlew :imgui:imgui-build:build_project_linux64_jni

      - name: Build FFM project
        run: ./gradlew :imgui:imgui-build:build_project_linux64_ffm

      - name: Build JNI ImLayout library
        run: ./gradlew :extensions:imlayout:imlayout-build:build_project_linux64_jni

      - name: Build FFM ImLayout library
        run: ./gradlew :extensions:imlayout:imlayout-build:build_project_linux64_ffm

      - name: Build JNI ImGuiColorTextEdit library
        run: ./gradlew :extensions:ImGuiColorTextEdit:textedit-build:build_project_linux64_jni

      - name: Build FFM ImGuiColorTextEdit library
        run: ./gradlew :extensions:ImGuiColorTextEdit:textedit-build:build_project_linux64_ffm

      - name: Build JNI imgui-node-editor library
        run: ./gradlew :extensions:imgui-node-editor:nodeeditor-build:build_project_linux64_jni

      - name: Build FFM imgui-node-editor library
        run: ./gradlew :extensions:imgui-node-editor:nodeeditor-build:build_project_linux64_ffm

      - name: Upload ImGui natives
        uses: actions/upload-artifact@v7
        with:
          name: linux-natives-imgui
          path: ./imgui/imgui-build/build/c++/libs/
          if-no-files-found: error

      - name: Upload ImLayout natives
        uses: actions/upload-artifact@v7
        with:
          name: linux-natives-imlayout
          path: ./extensions/imlayout/imlayout-build/build/c++/libs/
          if-no-files-found: error

      - name: Upload ImGuiColorTextEdit natives
        uses: actions/upload-artifact@v7
        with:
          name: linux-natives-textedit
          path: ./extensions/ImGuiColorTextEdit/textedit-build/build/c++/libs/
          if-no-files-found: error

      - name: Upload imgui-node-editor natives
        uses: actions/upload-artifact@v7
        with:
          name: linux-natives-nodeeditor
          path: ./extensions/imgui-node-editor/nodeeditor-build/build/c++/libs/
          if-no-files-found: error

  build_mac:
    name: Build Mac
    runs-on: macos-latest

    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.13.1
        with:
          access_token: ${{ github.token }}

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: 25

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Download sources
        run: ./gradlew download_all_sources

      - name: Build JNI project
        run: ./gradlew :imgui:imgui-build:build_project_mac64_jni :imgui:imgui-build:build_project_macArm_jni

      - name: Build FFM project
        run: ./gradlew :imgui:imgui-build:build_project_mac64_ffm :imgui:imgui-build:build_project_macArm_ffm

      - name: Build JNI ImLayout library
        run: ./gradlew :extensions:imlayout:imlayout-build:build_project_mac64_jni :extensions:imlayout:imlayout-build:build_project_macArm_jni

      - name: Build FFM ImLayout library
        run: ./gradlew :extensions:imlayout:imlayout-build:build_project_mac64_ffm :extensions:imlayout:imlayout-build:build_project_macArm_ffm

      - name: Build JNI ImGuiColorTextEdit library
        run: ./gradlew :extensions:ImGuiColorTextEdit:textedit-build:build_project_mac64_jni :extensions:ImGuiColorTextEdit:textedit-build:build_project_macArm_jni

      - name: Build FFM ImGuiColorTextEdit library
        run: ./gradlew :extensions:ImGuiColorTextEdit:textedit-build:build_project_mac64_ffm :extensions:ImGuiColorTextEdit:textedit-build:build_project_macArm_ffm

      - name: Build JNI imgui-node-editor library
        run: ./gradlew :extensions:imgui-node-editor:nodeeditor-build:build_project_mac64_jni :extensions:imgui-node-editor:nodeeditor-build:build_project_macArm_jni

      - name: Build FFM imgui-node-editor library
        run: ./gradlew :extensions:imgui-node-editor:nodeeditor-build:build_project_mac64_ffm :extensions:imgui-node-editor:nodeeditor-build:build_project_macArm_ffm

      - name: Upload ImGui natives
        uses: actions/upload-artifact@v7
        with:
          name: mac-natives-imgui
          path: ./imgui/imgui-build/build/c++/libs/
          if-no-files-found: error

      - name: Upload ImLayout natives
        uses: actions/upload-artifact@v7
        with:
          name: mac-natives-imlayout
          path: ./extensions/imlayout/imlayout-build/build/c++/libs/
          if-no-files-found: error

      - name: Upload ImGuiColorTextEdit natives
        uses: actions/upload-artifact@v7
        with:
          name: mac-natives-textedit
          path: ./extensions/ImGuiColorTextEdit/textedit-build/build/c++/libs/
          if-no-files-found: error

      - name: Upload imgui-node-editor natives
        uses: actions/upload-artifact@v7
        with:
          name: mac-natives-nodeeditor
          path: ./extensions/imgui-node-editor/nodeeditor-build/build/c++/libs/
          if-no-files-found: error

  build_teavm:
    name: Build TeaVM
    runs-on: ubuntu-latest

    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.13.1
        with:
          access_token: ${{ github.token }}

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: 25

      - name: Install emscripten
        uses: mymindstorm/setup-emsdk@v16
        with:
          version: 4.0.18

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Download sources
        run: ./gradlew download_all_sources

      - name: Build project
        run: ./gradlew :imgui:imgui-build:build_project_web_wasm

      - name: Build ImLayout library
        run: ./gradlew :extensions:imlayout:imlayout-build:build_project_web_wasm

      - name: Build ImGuiColorTextEdit library
        run: ./gradlew :extensions:ImGuiColorTextEdit:textedit-build:build_project_web_wasm

      - name: Build imgui-node-editor library
        run: ./gradlew :extensions:imgui-node-editor:nodeeditor-build:build_project_web_wasm

      - name: Upload ImGui natives
        uses: actions/upload-artifact@v7
        with:
          name: teavm-natives-imgui
          path: ./imgui/imgui-build/build/c++/libs/
          if-no-files-found: error

      - name: Upload ImLayout natives
        uses: actions/upload-artifact@v7
        with:
          name: teavm-natives-imlayout
          path: ./extensions/imlayout/imlayout-build/build/c++/libs/
          if-no-files-found: error

      - name: Upload ImGuiColorTextEdit natives
        uses: actions/upload-artifact@v7
        with:
          name: teavm-natives-textedit
          path: ./extensions/ImGuiColorTextEdit/textedit-build/build/c++/libs/
          if-no-files-found: error

      - name: Upload imgui-node-editor natives
        uses: actions/upload-artifact@v7
        with:
          name: teavm-natives-nodeeditor
          path: ./extensions/imgui-node-editor/nodeeditor-build/build/c++/libs/
          if-no-files-found: error

  build_android:
    name: Build Android
    runs-on: ubuntu-latest

    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.13.1
        with:
          access_token: ${{ github.token }}

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: 25

      - name: Install NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: false

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Download sources
        run: ./gradlew download_all_sources

      - name: Build project
        run: ./gradlew :imgui:imgui-build:build_project_android_jni
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Upload natives
        uses: actions/upload-artifact@v7
        with:
          name: android-natives
          path: ./imgui/imgui-build/build/c++/libs/
          if-no-files-found: error

  upload_natives:
    name: Upload Natives
    needs: [build_windows, build_linux, build_mac, build_android, build_teavm]
    runs-on: ubuntu-latest

    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.13.1
        with:
          access_token: ${{ github.token }}

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get version
        uses: madhead/read-java-properties@latest
        id: version
        with:
          file: "./gradle.properties"
          property: version
          default: 0.0.1

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: 25

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Delete generated Classes
        run: ./gradlew clean

      - name: Download mac ImGui natives
        uses: actions/download-artifact@v8
        with:
          name: windows-natives-imgui
          path: ./imgui/imgui-build/build/c++/libs/

      - name: Download mac ImLayout natives
        uses: actions/download-artifact@v8
        with:
          name: windows-natives-imlayout
          path: ./extensions/imlayout/imlayout-build/build/c++/libs/

      - name: Download mac ImGuiColorTextEdit natives
        uses: actions/download-artifact@v8
        with:
          name: windows-natives-textedit
          path: ./extensions/ImGuiColorTextEdit/textedit-build/build/c++/libs/

      - name: Download mac imgui-node-editor natives
        uses: actions/download-artifact@v8
        with:
          name: windows-natives-nodeeditor
          path: ./extensions/imgui-node-editor/nodeeditor-build/build/c++/libs/

      - name: Download mac ImGui natives
        uses: actions/download-artifact@v8
        with:
          name: linux-natives-imgui
          path: ./imgui/imgui-build/build/c++/libs/

      - name: Download mac ImLayout natives
        uses: actions/download-artifact@v8
        with:
          name: linux-natives-imlayout
          path: ./extensions/imlayout/imlayout-build/build/c++/libs/

      - name: Download mac ImGuiColorTextEdit natives
        uses: actions/download-artifact@v8
        with:
          name: linux-natives-textedit
          path: ./extensions/ImGuiColorTextEdit/textedit-build/build/c++/libs/

      - name: Download mac imgui-node-editor natives
        uses: actions/download-artifact@v8
        with:
          name: linux-natives-nodeeditor
          path: ./extensions/imgui-node-editor/nodeeditor-build/build/c++/libs/

      - name: Download mac ImGui natives
        uses: actions/download-artifact@v8
        with:
          name: mac-natives-imgui
          path: ./imgui/imgui-build/build/c++/libs/

      - name: Download mac ImLayout natives
        uses: actions/download-artifact@v8
        with:
          name: mac-natives-imlayout
          path: ./extensions/imlayout/imlayout-build/build/c++/libs/

      - name: Download mac ImGuiColorTextEdit natives
        uses: actions/download-artifact@v8
        with:
          name: mac-natives-textedit
          path: ./extensions/ImGuiColorTextEdit/textedit-build/build/c++/libs/

      - name: Download mac imgui-node-editor natives
        uses: actions/download-artifact@v8
        with:
          name: mac-natives-nodeeditor
          path: ./extensions/imgui-node-editor/nodeeditor-build/build/c++/libs/

      - name: Download teavm ImGui natives
        uses: actions/download-artifact@v8
        with:
          name: teavm-natives-imgui
          path: ./imgui/imgui-build/build/c++/libs/

      - name: Download teavm ImLayout natives
        uses: actions/download-artifact@v8
        with:
          name: teavm-natives-imlayout
          path: ./extensions/imlayout/imlayout-build/build/c++/libs/

      - name: Download teavm ImGuiColorTextEdit natives
        uses: actions/download-artifact@v8
        with:
          name: teavm-natives-textedit
          path: ./extensions/ImGuiColorTextEdit/textedit-build/build/c++/libs/

      - name: Download teavm imgui-node-editor natives
        uses: actions/download-artifact@v8
        with:
          name: teavm-natives-nodeeditor
          path: ./extensions/imgui-node-editor/nodeeditor-build/build/c++/libs/

      - name: Download android natives
        uses: actions/download-artifact@v8
        with:
          name: android-natives
          path: ./imgui/imgui-build/build/c++/libs/

      - name: Generate ImGui classes
        run: ./gradlew :imgui:imgui-build:build_project

      - name: Generate ImLayout library
        run: ./gradlew :extensions:imlayout:imlayout-build:build_project

      - name: Generate ImGuiColorTextEdit library
        run: ./gradlew :extensions:ImGuiColorTextEdit:textedit-build:build_project

      - name: Generate imgui-node-editor library
        run: ./gradlew :extensions:imgui-node-editor:nodeeditor-build:build_project

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "bot@github.com"

      - name: Commit generated code
        if: ${{ inputs.shouldUpload }}
        run: |
          git add .
          git commit -m "Commit generated code" || echo "No changes to commit"
          git push origin HEAD

      - name: Prepare Release deploy files
        if: ${{ inputs.shouldUpload && inputs.isRelease }}
        run: ./gradlew prepareReleaseDeploy

      - name: Upload Release deploy files artifact
        uses: actions/upload-artifact@v7
        if: ${{ inputs.shouldUpload && inputs.isRelease }}
        with:
          name: release-staging-deploy-${{ steps.version.outputs.value }}
          path: ./build/staging-deploy/

      - name: Upload Release to repository
        uses: nick-fields/retry@v4
        if: ${{ inputs.shouldUpload && inputs.isRelease }}
        with:
          max_attempts: 3
          timeout_minutes: 30
          retry_on: error
          command: ./gradlew publishRelease

      - name: Prepare Snapshot deploy files
        if: ${{ inputs.shouldUpload && !inputs.isRelease }}
        run: ./gradlew prepareSnapshotDeploy

      - name: Upload Snapshot deploy files artifact
        uses: actions/upload-artifact@v7
        if: ${{ inputs.shouldUpload && !inputs.isRelease }}
        with:
          name: snapshot-deploy-${{ steps.version.outputs.value }}-${{ github.run_number }}
          path: ./build/snapshot-deploy/

      - name: Upload Snapshot to repository
        uses: nick-fields/retry@v4
        if: ${{ inputs.shouldUpload && !inputs.isRelease }}
        with:
          max_attempts: 3
          timeout_minutes: 30
          retry_on: error
          command: ./gradlew publishSnapshot

      - name: Create Git tag
        uses: actions/github-script@v7
        if: ${{ inputs.isRelease }}
        with:
          script: |
            const versionOutputs = ${{ toJSON(steps.version.outputs) }};
            
            var version = versionOutputs.value;
            
            console.log("Version: " + version);
            
            var ref = "refs/tags/" + version
            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: ref,
              sha: context.sha
            });
